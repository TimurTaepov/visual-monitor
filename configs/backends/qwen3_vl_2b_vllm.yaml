backend: vllm
model_name: Qwen/Qwen3-VL-2B-Instruct
base_url: http://127.0.0.1:8001/v1
temperature: 0.0
max_tokens: 256
timeout_seconds: 60
concurrency: 4
estimated_cost_per_1k_requests_usd: 0.0
serve:
  enabled: true
  executable: vllm
  host: 127.0.0.1
  port: 8001
  health_path: /health
  startup_timeout_seconds: 900
  shutdown_timeout_seconds: 30
  reuse_existing: false
  args:
    - --dtype
    - auto
    - --generation-config
    - vllm
